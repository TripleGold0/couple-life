server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import: optional:file:./private/application-local.yml,optional:file:../private/application-local.yml
  application:
    name: couple-life-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/couple_life?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false
          timeout: 5000
          connectiontimeout: 5000
          writetimeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-couple-life-secret-key-at-least-32-bytes}
    expire-hours: ${JWT_EXPIRE_HOURS:168}
  upload-dir: ${UPLOAD_DIR:uploads}
  captcha:
    expose-code: ${CAPTCHA_EXPOSE_CODE:true}
    sms-cooldown-seconds: ${SMS_COOLDOWN_SECONDS:60}
    mail-from-name: ${MAIL_FROM_NAME:Couple Life}
  log:
    path: ${APP_LOG_PATH:logs}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://text.pollinations.ai/openai}
    model: ${OPENAI_MODEL:openai}
    temperature: ${OPENAI_TEMPERATURE:0.7}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.love.couplelife: ${LOGGING_LEVEL_APP:DEBUG}
    org.springframework.web: ${LOGGING_LEVEL_WEB:INFO}
    com.baomidou.mybatisplus: ${LOGGING_LEVEL_MYBATIS:INFO}
